name: Build fconcat

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            artifact: fconcat_linux_amd64
            
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            artifact: fconcat_linux_arm64
            
          - os: windows-latest
            platform: windows
            arch: amd64
            artifact: fconcat_windows_amd64.exe
            
          - os: macos-latest
            platform: darwin
            arch: amd64
            artifact: fconcat_darwin_amd64
            
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact: fconcat_darwin_arm64

    runs-on: ${{ matrix.os }}
    
    env:
      GOOS: ${{ matrix.platform }}
      GOARCH: ${{ matrix.arch }}

    steps:
    - uses: actions/checkout@v4
    
    # Set up ARM64 for Linux
    - name: Set up GCC for ARM64
      if: matrix.os == 'ubuntu-latest' && matrix.arch == 'arm64'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
        echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      timeout-minutes: 5
    
    # Fix for macOS static linking issue
    - name: Modify Makefile for macOS
      if: matrix.platform == 'darwin'
      run: |
        sed -i.bak 's/-static//' Makefile
      shell: bash
    
    # Windows-specific setup
    - name: Set up Windows build environment
      if: matrix.platform == 'windows'
      run: |
        choco install mingw --no-progress --yes
        echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # Verify GCC is available
        refreshenv
        gcc --version
    
    # Build step for Windows
    - name: Build (Windows)
      if: matrix.platform == 'windows'
      shell: cmd
      run: |
        set PATH=C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin;%PATH%
        mingw32-make
    
    # Build step for non-Windows
    - name: Build (non-Windows)
      if: matrix.platform != 'windows'
      run: make
    
    - name: Rename binary
      run: |
        if [ -f "fconcat" ]; then
          mv fconcat ${{ matrix.artifact }}
        elif [ -f "fconcat.exe" ]; then
          mv fconcat.exe ${{ matrix.artifact }}
        fi
      shell: bash
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}
        retention-days: 1

  # Only run release on tag pushes
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          fconcat_linux_amd64/fconcat_linux_amd64
          fconcat_linux_arm64/fconcat_linux_arm64
          fconcat_windows_amd64.exe/fconcat_windows_amd64.exe
          fconcat_darwin_amd64/fconcat_darwin_amd64
          fconcat_darwin_arm64/fconcat_darwin_arm64
        draft: false
        prerelease: false
        
  # Cleanup artifacts
  cleanup:
    needs: [build, release]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
    - name: Delete artifacts
      uses: geekyeggo/delete-artifact@v2
      continue-on-error: true
      with:
        name: |
          fconcat_linux_amd64
          fconcat_linux_arm64
          fconcat_windows_amd64.exe
          fconcat_darwin_amd64
          fconcat_darwin_arm64
        useGlob: true