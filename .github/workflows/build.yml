name: Build fconcat

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            artifact: fconcat_linux_amd64
            
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            artifact: fconcat_linux_arm64
            
          - os: windows-latest
            platform: windows
            arch: amd64
            artifact: fconcat_windows_amd64.exe
            
          - os: macos-latest
            platform: darwin
            arch: amd64
            artifact: fconcat_darwin_amd64
            
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact: fconcat_darwin_arm64

    runs-on: ${{ matrix.os }}
    
    env:
      GOOS: ${{ matrix.platform }}
      GOARCH: ${{ matrix.arch }}

    steps:
    - uses: actions/checkout@v3
    
    - name: Set VERSION variable
      run: echo "VERSION=$(git describe --tags --always)" >> $GITHUB_ENV
      shell: bash
    
    # Windows-specific setup
    - name: Setup MinGW (Windows)
      if: matrix.platform == 'windows'
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64
    
    # Ubuntu-specific setup for ARM64 cross-compilation
    - name: Install ARM64 cross-compiler (Ubuntu)
      if: matrix.platform == 'linux' && matrix.arch == 'arm64'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
    
    # Create a platform-specific Makefile
    - name: Create platform Makefile
      run: |
        cat > Makefile.platform << EOF
        # Platform-specific configurations
        UNAME := $(uname)
        CC = gcc
        
        ifeq ($(UNAME), Darwin)
          # macOS specific flags
          LDFLAGS =
        else ifeq ($(UNAME), Linux)
          ifeq ($(GOARCH), arm64)
            CC = aarch64-linux-gnu-gcc
          endif
          LDFLAGS = -static
        else
          # Windows specific flags
          CC = gcc
          LDFLAGS =
        endif
        
        # Export these variables so they're available to the main Makefile
        export CC
        export LDFLAGS
        EOF
      shell: bash
    
    # Include the platform-specific Makefile and build
    - name: Build
      run: |
        include Makefile.platform
        
        # Build with the environment's correct compiler
        $(CC) -Wall -Wextra -O2 -DVERSION=\"${{ env.VERSION }}\" -c src/main.c -o src/main.o
        $(CC) -Wall -Wextra -O2 -DVERSION=\"${{ env.VERSION }}\" -c src/concat.c -o src/concat.o
        $(CC) src/main.o src/concat.o $(LDFLAGS) -o ${{ matrix.artifact }}
      shell: bash
    
    # Upload the compiled binary as an artifact
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}
        retention-days: 1

  # Only run release on tag pushes
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          fconcat_linux_amd64/fconcat_linux_amd64
          fconcat_linux_arm64/fconcat_linux_arm64
          fconcat_windows_amd64.exe/fconcat_windows_amd64.exe
          fconcat_darwin_amd64/fconcat_darwin_amd64
          fconcat_darwin_arm64/fconcat_darwin_arm64
        draft: false
        prerelease: false
        
  # Cleanup artifacts
  cleanup:
    needs: [build, release]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
    - name: Delete artifacts
      uses: geekyeggo/delete-artifact@v2
      continue-on-error: true
      with:
        name: |
          fconcat_linux_amd64
          fconcat_linux_arm64
          fconcat_windows_amd64.exe
          fconcat_darwin_amd64
          fconcat_darwin_arm64
        useGlob: true