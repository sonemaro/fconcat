name: Build fconcat

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            artifact: fconcat_linux_amd64
            
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            artifact: fconcat_linux_arm64
            
          - os: windows-latest
            platform: windows
            arch: amd64
            artifact: fconcat_windows_amd64.exe
            
          - os: macos-latest
            platform: darwin
            arch: amd64
            artifact: fconcat_darwin_amd64
            
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact: fconcat_darwin_arm64

    runs-on: ${{ matrix.os }}
    
    env:
      GOOS: ${{ matrix.platform }}
      GOARCH: ${{ matrix.arch }}

    steps:
    - uses: actions/checkout@v3
    
    # Windows-specific setup
    - name: Setup MinGW (Windows)
      if: matrix.platform == 'windows'
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64
    
    # Fix for macOS static linking issue
    - name: Modify Makefile for macOS
      if: matrix.platform == 'darwin'
      run: |
        sed -i.bak 's/-static//' Makefile
      shell: bash
    
    - name: Build
      run: make
      
    - name: Rename binary
      run: |
        if [ -f "fconcat" ]; then
          mv fconcat ${{ matrix.artifact }}
        elif [ -f "fconcat.exe" ]; then
          mv fconcat.exe ${{ matrix.artifact }}
        fi
      shell: bash
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}
        retention-days: 1

  # Only run release on tag pushes
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          fconcat_linux_amd64/fconcat_linux_amd64
          fconcat_linux_arm64/fconcat_linux_arm64
          fconcat_windows_amd64.exe/fconcat_windows_amd64.exe
          fconcat_darwin_amd64/fconcat_darwin_amd64
          fconcat_darwin_arm64/fconcat_darwin_arm64
        draft: false
        prerelease: false
        
  # Cleanup artifacts
  cleanup:
    needs: [build, release]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
    - name: Delete artifacts
      uses: geekyeggo/delete-artifact@v2
      continue-on-error: true
      with:
        name: |
          fconcat_linux_amd64
          fconcat_linux_arm64
          fconcat_windows_amd64.exe
          fconcat_darwin_amd64
          fconcat_darwin_arm64
        useGlob: true